<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Weather App</h1>
            <div class="input-area">
                <input type="text" class="input-box" placeholder="input country">
                <button class="search-btn">search</button>

            </div>
        </div>


        <div class="main">
            <!-- <div class="weather-card">
                <h2>Country</h2>
                <p>Time</p>
                <p>Temperature</p>
                <p>Weather</p>
            </div> -->
            <div class="search-country"></div>
            <div class="cards">

                <div class="weather-card">
                    <h2 class="city">Singapore</h2>

                    <img class="weather-icon" src="" alt="weather icon">

                    <div class="temperature">31°C</div>

                    <div class="condition">Partly Cloudy</div>

                    <div class="details">
                        <p>Humidity: 82%</p>
                        <p>Wind: 12 km/h</p>
                        <p>Precipitation: 0.0</p>
                    </div>
                </div>
            </div>
            <div class="search-country"></div>
        </div>


        <div class="footer">
            <a href="https://www.github.com/clouery">Made by Xiang Zhi</a>
        </div>


    </div>
</body>

</html>
